name: mmp_official
description: "Mel Milaap Parivaar - Official App"
publish_to: 'none'
version: 1.0.2+6

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  intl: ^0.20.2
  shared_preferences: 2.5.3
  image_picker: ^1.1.2
  dio: ^5.9.2
  flutter_riverpod: ^3.3.1
  file_picker: ^11.0.2
  fluttertoast: ^9.0.0
  get: ^4.7.3
  connectivity_plus: ^7.1.1
  chewie: ^1.13.1
  video_player: ^2.11.1
  firebase_core:
  firebase_messaging:
  flutter_local_notifications: 19.5.0
  url_launcher: ^6.3.2
  font_awesome_flutter: ^11.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.14.4
  change_app_package_name: ^1.5.0

flutter:
  uses-material-design: true
  
  assets:
    - assets/images/
    - assets/icon/

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/images/mmp_logo.jpeg"
  remove_alpha_ios: true
